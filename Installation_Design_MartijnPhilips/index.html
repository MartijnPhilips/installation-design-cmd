<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticker Maker</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    
</head>

<body>
    <div id="grid"></div>
    <div class="sidebar">

        <div>
            <div class="palette" id="palette"></div>
        </div>

        <div class="draw-buttons">
            <div class="color eraser">
                <svg width="1200pt" height="1200pt" version="1.1" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
                <path d="m660 175-260 260 360 360 260-260c35-35 35-95 0-130l-230-230c-35-35-95-35-130 0z"/>
                <path transform="scale(50)" d="m11.3 20 9.2-9.2c0.7-0.7 0.7-1.9 0-2.6l-4.6-4.6c-0.7-0.7-1.9-0.7-2.6 0l-9.7 9.7c-0.7 0.7-0.7 1.9 0 2.6l4.1 4.1h14.3" fill="none" stroke="#000" stroke-linejoin="round" stroke-miterlimit="10" stroke-width="2"/>
                </svg>
            </div>
            <div id="resetBtn">
                <?xml version="1.0" encoding="utf-8"?><!-- Uploaded to: SVG Repo, www.svgrepo.com, Generator: SVG Repo Mixer Tools -->
                <svg width="800px" height="800px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 6H21M5 6V20C5 21.1046 5.89543 22 7 22H17C18.1046 22 19 21.1046 19 20V6M8 6V4C8 2.89543 8.89543 2 10 2H14C15.1046 2 16 2.89543 16 4V6" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M14 11V17" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M10 11V17" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
        </div>
        <div class="export-wrapper">
            <button id="exportBtn" disabled>
                Maak monster!
            </button>


            <div class="info">
                <p>Alle vakken moeten direct verbonden zijn.</p>
            </div>
        </div>
    </div>

    <div id="resetModal" class="modal hidden">
        <div class="modal-box">
            <p>Weet je zeker dat je alles wilt leegmaken?</p>

            <div class="modal-buttons">
                <button id="cancelReset">Annuleren</button>
                <button id="confirmReset" class="danger">Leegmaken</button>
            </div>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>

</html>
